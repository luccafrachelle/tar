name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verificar HTML renderizado
        run: |
          test -f index.html || { echo "Falta index.html — renderizá localmente y commiteá el HTML."; exit 1; }
          test -f labs/lab4/Lab4.html || { echo "Falta labs/lab4/Lab4.html"; exit 1; }

      - name: Armar sitio estático
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          cp -r labs _site/
          cp -r entrega _site/
          find _site -name '*.qmd' -delete
          find _site -name '*.ipynb' -delete
          find _site -name '*.py' -delete

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
