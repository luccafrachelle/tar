name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verificar sitio estático
        run: |
          test -f site/index.html || { echo "Falta site/index.html — corré bash scripts/render-site.sh y commiteá site/."; exit 1; }
          test -f site/lab4.html || { echo "Falta site/lab4.html"; exit 1; }

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
