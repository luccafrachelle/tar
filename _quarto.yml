project:
  type: default
  resources:
    - assets

lang: es
bibliography: references.bib

metadata:
  author: "Lucca Frachelle"
  subtitle: "TAR: Taller de Aprendizaje por Refuerzo 2026"
  link-external-newwindow: true
  title-block-banner: false
  date-format: long
  fig-align: center
  anchor-sections: true
  code-copy: true
  code-overflow: wrap
  syntax-highlighting:
    light: github-light
    dark: github-dark

format:
  html:
    toc: true
    toc-depth: 2
    number-sections: false
    echo: true
    embed-resources: true
    grid:
      body-width: 1000px
    theme:
      light:
        - cosmo
        - assets/stylesheets/theme.scss
        - assets/stylesheets/tar-lab.scss
      dark:
        - cosmo
        - assets/stylesheets/theme.scss
        - assets/stylesheets/tar-lab.scss
    include-after-body:
      - file: assets/scripts/external-links.html

  revealjs:
    embed-resources: true
    theme:
      - default
      - assets/stylesheets/tar-reveal.scss
    slide-number: c/t
    progress: true
    html-math-method: katex
    footer: "Lucca Frachelle · TAR 2026"
    transition: slide
    width: 1280
    height: 720
    center: true
    code-copy: true
